name: build-windows
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Run tests (unittest, tkinter present on Windows)
        run: python -m unittest discover -s tests
      - name: Build exe
        run: pyinstaller --onefile --windowed --name KIPRIS-NOL --icon assets/kipris-nol.ico app.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KIPRIS-NOL-exe
          path: dist/KIPRIS-NOL.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/KIPRIS-NOL.exe
